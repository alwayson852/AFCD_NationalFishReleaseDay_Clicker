<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fish Cage Event</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            display: flex; justify-content: center; align-items: center;
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
            font-family: -apple-system, "Helvetica Neue", sans-serif;
        }

        /* 魚籠容器 */
        #cage {
            position: relative;
            width: 80vmin;
            height: 80vmin;
            background-color: rgba(255, 255, 255, 0.1);
            border: 6px solid #ffffff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden; /* 確保魚不出界 */
            outline: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 點擊縮放動畫 */
        .click-active {
            animation: bounce 0.2s ease-out;
        }

        @keyframes bounce {
            0% { transform: scale(1); }
            50% { transform: scale(0.96); }
            100% { transform: scale(1); }
        }

        /* 魚的樣式 - 預設不顯示，直到 JS 生成 */
        .fish {
            position: absolute;
            width: 50px;
            height: auto;
            pointer-events: none;
            user-select: none;
            display: block; /* 確保顯示 */
            border: none;   /* 移除可能的邊框 */
        }

        /* 提示字 */
        #hint {
            color: white;
            font-weight: bold;
            font-size: 6vmin;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="cage">
        <div id="hint">㩒我加魚！</div>
    </div>

    <script>
        const cage = document.getElementById('cage');
        const hint = document.getElementById('hint');

        cage.addEventListener('click', () => {
            // 第一次點擊後移除提示字節點，徹底清空中心
            if (hint && hint.parentNode) {
                hint.parentNode.removeChild(hint);
            }

            // 每次點擊加 5-8 條魚
            const batchSize = Math.floor(Math.random() * 4) + 5;
            for (let i = 0; i < batchSize; i++) {
                addFish();
            }

            // 動畫效果
            cage.classList.remove('click-active');
            void cage.offsetWidth; 
            cage.classList.add('click-active');
        });

        function addFish() {
            const fish = document.createElement('img');
            fish.src = 'fish.png';
            fish.className = 'fish';
            
            // 確保圖片載入前不顯示碎圖點點（非必要但更保險）
            fish.style.opacity = "0";
            fish.onload = () => { fish.style.opacity = "1"; };

            // 數學計算：確保魚在圓形範圍內
            const radius = Math.sqrt(Math.random()) * 43; // 43% 半徑，留少許邊距
            const angle = Math.random() * Math.PI * 2;
            
            const x = 50 + radius * Math.cos(angle);
            const y = 50 + radius * Math.sin(angle);

            const rotation = Math.random() * 360;
            const scale = 0.7 + Math.random() * 0.5;

            fish.style.left = `${x}%`;
            fish.style.top = `${y}%`;
            fish.style.transform = `translate(-50%, -50%) rotate(${rotation}deg) scale(${scale})`;

            cage.appendChild(fish);
        }
    </script>
</body>
</html>
